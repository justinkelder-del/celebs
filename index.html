<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Celebrity Draft Voting</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background:#f5f7fb;}
#galleryGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.team { background:white; padding:20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.08);}
.card { border:1px solid #ddd; border-radius:12px; overflow:hidden; margin-bottom:12px;}
.card img { width:100%; height:260px; object-fit:cover; object-position:top;}
.category { background:#111; color:white; padding:6px 10px; font-size:12px;}
button { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#1d4ed8; color:white; cursor:pointer;}
</style>
</head>
<body>

<div id="galleryGrid"></div>

<script src="script.js"></script>

</body>
</html>
