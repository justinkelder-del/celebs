<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Anonymous Celebrity Draft Voting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f7fb;
      color: #142033;
    }
    h1 { font-size: 44px; line-height: 1.05; margin: 0 0 12px; }
    .subtitle { color: #5f6f86; font-size: 18px; margin: 0 0 26px; }
    .topbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
    .pill {
      background: white; border: 1px solid #dbe3ef; border-radius: 999px;
      padding: 10px 16px; font-size: 14px; color: #475569;
    }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .top-button {
      border: 0; border-radius: 14px; padding: 12px 16px;
      font-weight: 700; cursor: pointer;
    }
    .primary { background: #1d4ed8; color: white; }
    .secondary { background: white; color: #142033; border: 1px solid #dbe3ef; }
    .notice, .error-banner {
      background: #fff; border: 1px solid #dbe3ef; border-radius: 18px;
      padding: 16px 18px; margin-bottom: 28px;
    }
    .notice { color: #475569; }
    .error-banner {
      background: #fff1f2; border-color: #fecdd3; color: #9f1239;
      display: none; white-space: pre-wrap;
    }
    #leaderboard, #galleryGrid, #resultsMode { width: 100%; }
    #leaderboard {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 18px; margin-bottom: 28px;
    }
    .leader-card {
      background: white; border-radius: 20px; padding: 18px;
      border: 1px solid rgba(219, 227, 239, 0.9);
      box-shadow: 0 12px 30px rgba(20, 32, 51, 0.06);
    }
    .leader-card h3 { margin: 0 0 8px; font-size: 22px; }
    .leader-stat { font-size: 14px; color: #475569; margin-bottom: 10px; }
    .progress { width: 100%; height: 10px; background: #e8eef8; border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #1d4ed8, #4f7df0); border-radius: 999px; }
    #galleryGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
    .team {
      background: white; border-radius: 28px; padding: 24px;
      box-shadow: 0 20px 50px rgba(20, 32, 51, 0.10);
      border: 1px solid rgba(219, 227, 239, 0.85);
    }
    .team h2 { margin: 0 0 8px; font-size: 32px; }
    .team-sub { margin: 0 0 18px; color: #5f6f86; }
    .vote-box {
      background: #f8fafc; padding: 16px; border-radius: 16px;
      margin-bottom: 20px; border: 1px solid #e2e8f0;
    }
    .vote-title { font-size: 14px; font-weight: 800; margin-bottom: 8px; }
    .small { font-size: 13px; color: #64748b; }
    button {
      width: 100%; padding: 12px; border-radius: 12px; border: none;
      font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 14px;
    }
    .vote-btn { background: #1d4ed8; color: white; }
    .vote-btn.secondary-dark { background: #0f172a; color: white; }
    .card {
      border: 1px solid #e2e8f0; border-radius: 16px;
      overflow: hidden; margin-bottom: 16px; background: white;
    }
    .category {
      background: #0f172a; color: white; padding: 10px 12px;
      font-size: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: .04em;
    }
    .card img {
      width: 100%; aspect-ratio: 3 / 4; object-fit: cover;
      object-position: top; display: block; background: #e2e8f0;
    }
    .info { padding: 12px; }
    .celeb-name { font-size: 16px; font-weight: 800; color: #142033; margin-bottom: 4px; }
    #resultsMode { display: none; }
    .results-wrap {
      background: white; border-radius: 28px; padding: 28px;
      border: 1px solid rgba(219, 227, 239, 0.85);
      box-shadow: 0 20px 50px rgba(20, 32, 51, 0.10);
    }
    .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 24px; }
    .winner-banner {
      background: #0f172a; color: white; border-radius: 20px;
      padding: 18px; margin-bottom: 22px;
    }
    .cat-results { margin-top: 28px; display: grid; gap: 14px; }
    .cat-row {
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 14px;
    }
    .cat-row-title { font-size: 14px; font-weight: 800; margin-bottom: 8px; }
    .hidden { display: none !important; }
    @media (max-width: 1100px) {
      #galleryGrid, #leaderboard, .results-grid { grid-template-columns: 1fr; }
      body { padding: 20px; }
    }
  </style>
</head>
<body>
  <h1>Vote for the best overall team</h1>
  <p class="subtitle">Vote by category and overall team. Scores update live for everyone.</p>

  <div class="topbar">
    <div class="pill" id="overallTotalPill">0 overall votes</div>
    <div class="pill" id="categoryTotalPill">0 category votes</div>
    <div class="pill" id="resultsStatusPill">Results hidden</div>
  </div>

  <div class="controls">
    <button class="top-button secondary" id="showVotingBtn">Voting View</button>
    <button class="top-button secondary" id="showResultsBtn">Results View</button>
    <button class="top-button primary" id="toggleRevealBtn">Toggle Results Reveal</button>
  </div>

  <div class="notice">
    One overall vote per browser and one vote per category per browser. Results update live across all visitors.
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div id="leaderboard"></div>
  <div id="galleryGrid"></div>

  <div id="resultsMode">
    <div class="results-wrap">
      <div class="winner-banner" id="overallWinnerBanner"></div>
      <div class="results-grid" id="resultsOverallGrid"></div>
      <div class="cat-results" id="categoryResultsGrid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
